<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TED Learn — 精選 TED 英文學習</title>
<style>
:root {
  --bg:#0d0d0d; --bg2:#141414; --bg3:#1c1c1c; --bg4:#252525;
  --border:#2a2a2a; --text:#e8e8e8; --text2:#888; --text3:#444;
  --red:#e62b1e; --red2:#ff5c54; --gold:#f5a623;
  --hl:rgba(230,43,30,.13); --hl-b:#e62b1e;
  --word-h:rgba(230,43,30,.18); --aw:#ff6b60;
  --btn:#1e1e1e; --btn-h:#282828;
  --shadow:0 8px 40px rgba(0,0,0,.7);
  --r:10px;
}
[data-theme="light"]{
  --bg:#f2f4f7; --bg2:#fff; --bg3:#e8ebf0; --bg4:#dce0e8;
  --border:#d0d5dd; --text:#111827; --text2:#6b7280; --text3:#cbd5e1;
  --hl:rgba(230,43,30,.07); --hl-b:#e62b1e;
  --word-h:rgba(230,43,30,.12); --aw:#c0392b;
  --btn:#e8ebf0; --btn-h:#dce0e8; --shadow:0 4px 20px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);color:var(--text);display:flex;flex-direction:column;transition:background .3s,color .3s}

/* ── HEADER ── */
header{
  display:flex;align-items:center;gap:0;padding:0;
  background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;
}
.header-left{
  display:flex;align-items:center;gap:12px;padding:10px 16px;
  border-right:1px solid var(--border);flex-shrink:0;
}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-badge{
  background:var(--red);color:#fff;font-weight:900;font-size:.85rem;
  padding:3px 8px;border-radius:5px;letter-spacing:.5px;
}
.logo-text{font-weight:700;font-size:1rem;color:var(--text);letter-spacing:-.3px}
.logo-sub{font-size:.7rem;color:var(--text2);font-weight:400}

/* ── CATEGORY TABS ── */
#cat-bar{
  display:flex;align-items:center;gap:2px;padding:8px 12px;
  overflow-x:auto;flex:1;scrollbar-width:none;
}
#cat-bar::-webkit-scrollbar{display:none}
.cat-btn{
  padding:5px 13px;border-radius:20px;border:1px solid transparent;
  background:transparent;color:var(--text2);cursor:pointer;font-size:.78rem;
  font-weight:600;transition:all .15s;white-space:nowrap;
}
.cat-btn:hover{background:var(--bg3);color:var(--text)}
.cat-btn.active{background:var(--red);color:#fff;border-color:var(--red)}

.header-right{
  display:flex;align-items:center;gap:8px;padding:10px 14px;
  border-left:1px solid var(--border);flex-shrink:0;
}
.ibtn{
  background:var(--btn);border:1px solid var(--border);color:var(--text2);
  padding:5px 10px;border-radius:6px;cursor:pointer;font-size:.8rem;
  transition:all .15s;white-space:nowrap;
}
.ibtn:hover{background:var(--btn-h);color:var(--text)}
.ibtn.on{background:var(--red);color:#fff;border-color:var(--red)}

/* ── MAIN ── */
#main{display:flex;flex:1;overflow:hidden}

/* ── LEFT PANEL ── */
#left{
  width:320px;min-width:260px;flex-shrink:0;
  display:flex;flex-direction:column;background:var(--bg2);
  border-right:1px solid var(--border);overflow:hidden;
}
#search-wrap{
  padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
}
#talk-search{
  width:100%;padding:7px 10px;border-radius:7px;
  border:1px solid var(--border);background:var(--bg3);color:var(--text);
  font-size:.82rem;outline:none;transition:border-color .2s;
}
#talk-search:focus{border-color:var(--red)}
#talk-search::placeholder{color:var(--text3)}

#talk-list{flex:1;overflow-y:auto;padding:6px}
#talk-list::-webkit-scrollbar{width:4px}
#talk-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.talk-card{
  display:flex;align-items:flex-start;gap:9px;padding:9px 8px;
  border-radius:8px;cursor:pointer;transition:background .15s;
  border:1px solid transparent;margin-bottom:2px;
}
.talk-card:hover{background:var(--bg3)}
.talk-card.active{background:var(--hl);border-color:var(--hl-b)}
.talk-thumb{
  width:72px;height:46px;border-radius:5px;object-fit:cover;
  background:var(--bg4);flex-shrink:0;
}
.talk-info{flex:1;min-width:0}
.talk-title{
  font-size:.8rem;font-weight:700;color:var(--text);
  line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}
.talk-card.active .talk-title{color:var(--red2)}
.talk-meta{
  display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap;
}
.talk-speaker{font-size:.7rem;color:var(--text2)}
.talk-tag{
  font-size:.64rem;background:var(--bg4);color:var(--text2);
  padding:1px 6px;border-radius:3px;
}
.talk-dur{font-size:.65rem;color:var(--text3);margin-left:auto}

/* ── MIDDLE: PLAYER ── */
#middle{
  flex:1;display:flex;flex-direction:column;background:#000;
  border-right:1px solid var(--border);min-width:0;
}
#player-wrap{position:relative;width:100%;padding-top:56.25%;background:#000;flex-shrink:0}
#player-wrap>*{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
#ted-embed{display:none}
#yt-player-div{display:none}
#placeholder-mid{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--text3);gap:12px;font-size:.9rem;text-align:center;padding:30px;background:#000;
}
.ph-big{font-size:3.5rem}
.ph-hint{font-size:.78rem;color:var(--text3)}

/* Info bar */
#info-bar{
  display:none;align-items:center;gap:10px;padding:8px 14px;
  background:linear-gradient(90deg,rgba(230,43,30,.15),transparent);
  border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;
}
#info-bar.show{display:flex}
#ib-thumb{width:52px;height:33px;border-radius:4px;object-fit:cover;background:var(--bg4)}
#ib-meta{flex:1;min-width:0}
#ib-title{font-size:.82rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#ib-speaker{font-size:.72rem;color:var(--text2)}
#ib-views{font-size:.7rem;color:var(--text3);margin-left:auto;white-space:nowrap}
.ted-badge{background:var(--red);color:#fff;font-size:.65rem;font-weight:800;padding:2px 6px;border-radius:4px;flex-shrink:0}

/* Controls */
#controls{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:var(--bg2);border-top:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;
}
.cbtn{
  background:var(--btn);border:1px solid var(--border);color:var(--text);
  padding:6px 12px;border-radius:7px;cursor:pointer;font-size:.8rem;
  transition:background .15s;white-space:nowrap;
}
.cbtn:hover{background:var(--btn-h)}
.cbtn.on{background:var(--red);color:#fff;border-color:var(--red);font-weight:700}
select.csel{
  background:var(--btn);border:1px solid var(--border);color:var(--text);
  padding:5px 7px;border-radius:7px;cursor:pointer;font-size:.8rem;
}
.clabel{font-size:.73rem;color:var(--text2)}
#fs-range{
  -webkit-appearance:none;appearance:none;width:65px;height:3px;
  background:var(--border);border-radius:2px;outline:none;cursor:pointer;
}
#fs-range::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:var(--red);cursor:pointer;
}

/* Progress bar */
#progress-wrap{
  height:3px;background:var(--bg3);position:relative;cursor:pointer;flex-shrink:0;
}
#progress-bar{height:100%;background:var(--red);width:0;transition:width .3s linear;pointer-events:none}
#progress-wrap:hover #progress-bar{height:5px;margin-top:-1px}

/* ── RIGHT: CAPTIONS ── */
#right{
  width:360px;min-width:260px;flex-shrink:0;display:flex;
  flex-direction:column;background:var(--bg);overflow:hidden;
}
#cap-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border);
  flex-shrink:0;flex-wrap:wrap;gap:5px;
}
.ch-l{display:flex;align-items:center;gap:7px}
.ch-title{font-size:.78rem;font-weight:700;color:var(--text2)}
#cap-status{font-size:.72rem;color:var(--red);font-weight:600}
.ch-r{display:flex;gap:5px}
.sm-btn{
  font-size:.72rem;background:var(--btn);border:1px solid var(--border);
  color:var(--text2);padding:3px 8px;border-radius:5px;cursor:pointer;transition:all .15s;
}
.sm-btn:hover{background:var(--btn-h);color:var(--text)}
.sm-btn.on{background:var(--red);color:#fff;border-color:var(--red)}

#cap-list{flex:1;overflow-y:auto;padding:8px 6px;scroll-behavior:smooth}
#cap-list::-webkit-scrollbar{width:4px}
#cap-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Caption item */
.ci{
  padding:9px 11px;margin-bottom:4px;border-radius:8px;
  border-left:3px solid transparent;cursor:pointer;transition:background .12s,border-color .12s;
}
.ci:hover{background:var(--bg3)}
.ci.active{background:var(--hl);border-left-color:var(--hl-b)}
.ci-time{font-size:.67rem;color:var(--text3);margin-bottom:3px}
.ci-en{font-size:var(--cfz,1rem);line-height:1.65;color:var(--text)}
.ci-zh{
  font-size:calc(var(--cfz,1rem)*.8);color:var(--text2);margin-top:3px;
  display:none;font-style:italic;line-height:1.4;
}
.ci-zh.show{display:block}

/* word */
.w{
  display:inline-block;cursor:pointer;padding:1px 2px;border-radius:3px;
  position:relative;transition:background .1s;
}
.w:hover{background:var(--word-h)}
.w.aw{color:var(--aw);font-weight:700;animation:wb .25s ease}
@keyframes wb{0%{transform:translateY(0) scale(1)}40%{transform:translateY(-4px) scale(1.1)}100%{transform:translateY(0)}}

/* tooltip */
.dt{
  display:none;position:absolute;bottom:calc(100% + 8px);left:50%;
  transform:translateX(-50%);background:var(--bg2);border:1px solid var(--red);
  border-radius:10px;padding:9px 13px;min-width:165px;max-width:220px;
  box-shadow:var(--shadow);z-index:999;pointer-events:none;font-size:.78rem;line-height:1.5;
}
.w:hover .dt{display:block}
.dt-w{font-weight:800;color:var(--red2);font-size:.9rem}
.dt-ph{color:var(--text2);font-size:.72rem}
.dt-pos{color:var(--gold);font-size:.7rem;margin-top:2px}
.dt-def{color:var(--text);margin-top:2px}
.dt-ex{color:var(--text2);font-style:italic;font-size:.72rem;margin-top:2px;border-top:1px solid var(--border);padding-top:3px;margin-top:4px}

/* No content */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--text3);gap:8px;font-size:.85rem;text-align:center;padding:20px;
}

/* kbd */
#kbds{
  padding:5px 12px;background:var(--bg2);border-top:1px solid var(--border);
  font-size:.68rem;color:var(--text3);display:flex;gap:10px;flex-wrap:wrap;flex-shrink:0;
}
kbd{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:3px;padding:1px 5px;font-size:.65rem;color:var(--text2);
}

/* Loading */
#loading{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:12px;
}
#loading.show{display:flex}
.spin{
  width:36px;height:36px;border:3px solid #2a2a2a;
  border-top-color:var(--red);border-radius:50%;animation:sp .65s linear infinite;
}
@keyframes sp{to{transform:rotate(360deg)}}
#load-msg{font-size:.88rem;color:#ccc}

/* Responsive */
@media(max-width:900px){#left{width:260px} #right{width:280px}}
@media(max-width:650px){
  #main{flex-direction:column}
  #left{width:100%;height:200px;border-right:none;border-bottom:1px solid var(--border)}
  #right{width:100%;min-height:180px}
}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><span id="load-msg">載入字幕中…</span></div>

<!-- HEADER -->
<header>
  <div class="header-left">
    <a class="logo" href="#">
      <span class="logo-badge">TED</span>
      <div>
        <div class="logo-text">Learn</div>
        <div class="logo-sub">英文學習模式</div>
      </div>
    </a>
  </div>
  <div id="cat-bar">
    <button class="cat-btn active" data-cat="all">全部</button>
    <button class="cat-btn" data-cat="education">🎓 教育</button>
    <button class="cat-btn" data-cat="psychology">🧠 心理</button>
    <button class="cat-btn" data-cat="technology">💻 科技</button>
    <button class="cat-btn" data-cat="science">🔬 科學</button>
    <button class="cat-btn" data-cat="health">❤️ 健康</button>
    <button class="cat-btn" data-cat="creativity">🎨 創意</button>
    <button class="cat-btn" data-cat="leadership">🚀 領導</button>
    <button class="cat-btn" data-cat="society">🌍 社會</button>
    <button class="cat-btn" data-cat="happiness">😊 幸福</button>
  </div>
  <div class="header-right">
    <button class="ibtn on" id="zh-btn">🇹🇼 中文</button>
    <button class="ibtn" id="theme-btn">🌙</button>
  </div>
</header>

<!-- MAIN -->
<div id="main">

  <!-- LEFT: TALK LIST -->
  <div id="left">
    <div id="search-wrap">
      <input id="talk-search" type="text" placeholder="🔍 搜尋演講、講者…">
    </div>
    <div id="talk-list">
      <div class="empty-state"><div class="spin" style="width:24px;height:24px"></div></div>
    </div>
  </div>

  <!-- MIDDLE: PLAYER -->
  <div id="middle">
    <div id="player-wrap">
      <div id="placeholder-mid">
        <div class="ph-big">🎤</div>
        <div>請從左側選擇一場 TED 演講</div>
        <div class="ph-hint">支援即時字幕 · 單字查詢 · 中文翻譯</div>
      </div>
      <iframe id="ted-embed" allowfullscreen
        allow="autoplay; fullscreen; encrypted-media"></iframe>
      <div id="yt-player-div"></div>
    </div>
    <!-- Info bar -->
    <div id="info-bar">
      <img id="ib-thumb" src="" alt="">
      <div id="ib-meta">
        <div id="ib-title">—</div>
        <div id="ib-speaker">—</div>
      </div>
      <span id="ib-views"></span>
      <span class="ted-badge">TED</span>
    </div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <!-- Controls -->
    <div id="controls">
      <button class="cbtn" id="pp-btn">▶ 播放</button>
      <select class="csel" id="speed-sel">
        <option value=".5">0.5×</option>
        <option value=".75">0.75×</option>
        <option value="1" selected>1×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2×</option>
      </select>
      <button class="cbtn" id="rep-btn">↩ 重播</button>
      <button class="cbtn" id="ap-btn">⏸ 自動暫停</button>
      <span class="clabel">字幕大小</span>
      <input type="range" id="fs-range" min="12" max="26" value="15">
    </div>
  </div>

  <!-- RIGHT: CAPTIONS -->
  <div id="right">
    <div id="cap-header">
      <div class="ch-l">
        <span class="ch-title">📝 即時字幕</span>
        <span id="cap-status">等待選擇</span>
      </div>
      <div class="ch-r">
        <button class="sm-btn on" id="zh-cap-btn">中文</button>
        <button class="sm-btn" id="fullscr-btn">⛶</button>
      </div>
    </div>
    <div id="cap-list">
      <div class="empty-state">
        <span style="font-size:2.5rem">🎤</span>
        <span>選擇演講後字幕出現於此</span>
      </div>
    </div>
    <div id="kbds">
      <span><kbd>Space</kbd>播放</span>
      <span><kbd>←→</kbd>±5s</span>
      <span><kbd>R</kbd>重播</span>
      <span><kbd>A</kbd>自動暫停</span>
      <span><kbd>Z</kbd>中文</span>
      <span><kbd>+−</kbd>大小</span>
      <span><kbd>T</kbd>主題</span>
    </div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
// ═══════════════════════════════════════════════════
//  TALK DATABASE  (精選 50+ TED Talks)
// ═══════════════════════════════════════════════════
const TALKS = [

  {slug:"ken_robinson_says_schools_kill_creativity",title:"Do schools kill creativity?",speaker:"Sir Ken Robinson",year:2006,duration:"19:12",cat:"education",level:"B1",views:"72M",thumb:"https://pi.tedcdn.com/r/talkstar-photos.s3.amazonaws.com/uploads/9e25aff6-b53c-475e-a1f8-74b0c20d9095/KenRobinson_2006-embed.jpg"},

  {slug:"jane_goodall_what_separates_us_from_chimpanzees",title:"What separates us from chimpanzees?",speaker:"Jane Goodall",year:2002,duration:"26:52",cat:"science",level:"B2",views:"3M"},

  // Health
  {slug:"michael_pollan_a_plant_s_eye_view",title:"A plant's eye view",speaker:"Michael Pollan",year:2007,duration:"17:35",cat:"health",level:"B2",views:"3M"},

const LEVEL_COLOR = {A2:'#10b981',B1:'#3b82f6',B2:'#f59e0b',C1:'#ef4444'};

function renderTalkList() {
  const list = $('talk-list');
  const q = searchQuery.toLowerCase();
  const filtered = TALKS.filter(t => {
    const matchCat = currentCat === 'all' || t.cat === currentCat;
    const matchQ   = !q || t.title.toLowerCase().includes(q) || t.speaker.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><span>😢 找不到相關演講</span></div>';
    return;
  }

  list.innerHTML = filtered.map(t => {
    const isActive = currentTalk && currentTalk.slug === t.slug;
    const thumb = t.thumb || `{{https://pi.tedcdn.com/r/talkstar-photos.s3.amazonaws.com/uploads/${t.slug}/embed.jpg}}?w=140`;
    const lvlCol = LEVEL_COLOR[t.level] || '#888';
    return `<div class="talk-card${isActive?' active':''}" data-slug="${t.slug}">
      <img class="talk-thumb" src="${thumb}" alt="" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2272%22 height=%2246%22><rect width=%22100%25%22 height=%22100%25%22 fill=%22%23222%22/><text x=%2250%25%22 y=%2255%25%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2218%22>🎤</text></svg>'">
      <div class="talk-info">
        <div class="talk-title">${t.title}</div>
        <div class="talk-meta">
          <span class="talk-speaker">${t.speaker}</span>
          <span class="talk-tag" style="color:${lvlCol};border-color:${lvlCol}20;background:${lvlCol}15">${t.level}</span>
          <span class="talk-dur">${t.duration}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  list.querySelectorAll('.talk-card').forEach(card => {
    card.addEventListener('click', () => {
      const talk = TALKS.find(t => t.slug === card.dataset.slug);
      if (talk) selectTalk(talk);
    });
  });
}

// ═══════════════════════════════════════════════════
//  SELECT TALK
// ═══════════════════════════════════════════════════
async function selectTalk(talk) {
  currentTalk  = talk;
  captions     = [];
  currentIdx   = -1;
  autoPausedAt = -1;
  stopRaf();

  renderTalkList(); // update active state

  // Info bar
  $('ib-title').textContent   = talk.title;
  $('ib-speaker').textContent = `${talk.speaker} · ${talk.year}`;
  $('ib-views').textContent   = talk.views ? `👁 ${talk.views}` : '';
  const thumb = talk.thumb || '';
  $('ib-thumb').src = thumb;
  $('info-bar').classList.add('show');

  // Load player
  loadTEDEmbed(talk.slug);

  // Fetch captions
  showLoad('抓取字幕中…');
  $('cap-status').textContent = '載入字幕…';
  captions = [];
  renderCaptions();

  await fetchTEDCaptions(talk.slug);

  hideLoad();
  renderCaptions();
  startRaf();
}

// ═══════════════════════════════════════════════════
//  TED EMBED + YOUTUBE FALLBACK
// ═══════════════════════════════════════════════════
function loadTEDEmbed(slug) {
  $('placeholder-mid').style.display = 'none';
  $('yt-player-div').style.display   = 'none';
  const ted = $('ted-embed');
  ted.style.display = 'block';
  ted.src = `https://embed.ted.com/talks/${slug}?autoplay=1&controls=1`;
}

// If we have a YouTube ID, use YT player (better sync)
function switchToYT(ytId) {
  $('ted-embed').style.display     = 'none';
  $('yt-player-div').style.display = 'block';

  if (ytPlayer) { ytPlayer.loadVideoById(ytId); return; }

  const doInit = () => {
    ytPlayer = new YT.Player('yt-player-div', {
      videoId: ytId,
      playerVars:{rel:0,modestbranding:1,iv_load_policy:3,controls:1},
      events:{
        onReady: () => { startRaf(); updateProgress(); },
        onStateChange: (e) => {
          $('pp-btn').textContent =
            e.data === YT.PlayerState.PLAYING ? '⏸ 暫停' : '▶ 播放';
          if (e.data === YT.PlayerState.PLAYING) startRaf();
          if (e.data === YT.PlayerState.ENDED)   stopRaf();
        }
      }
    });
  };
  if (window.YT && YT.Player) doInit();
  else { const t = setInterval(()=>{ if(window.YT&&YT.Player){clearInterval(t);doInit();} },200); }
}

// ═══════════════════════════════════════════════════
//  FETCH TED CAPTIONS
// ═══════════════════════════════════════════════════
const PROXY = 'https://corsproxy.io/?';

async function fetchTEDCaptions(slug) {
  const enUrl = `https://www.ted.com/talks/${slug}/transcript.json`;
  const zhUrl = `https://www.ted.com/talks/${slug}/transcript.json?language=zh-tw`;

  let enData = null, zhData = null;

  // Try en transcript
  for (const p of ['', PROXY]) {
    try {
      const r = await fetch(p + (p ? encodeURIComponent(enUrl) : enUrl),
        {signal: AbortSignal.timeout(10000)});
      if (r.ok) { enData = await r.json(); break; }
    } catch {}
  }

  // Try zh-tw transcript
  for (const p of ['', PROXY]) {
    try {
      const r = await fetch(p + (p ? encodeURIComponent(zhUrl) : zhUrl),
        {signal: AbortSignal.timeout(8000)});
      if (r.ok) { zhData = await r.json(); break; }
    } catch {}
  }

  // Also try to get YouTube ID from TED HTML for better sync
  try {
    const htmlUrl = `https://www.ted.com/talks/${slug}`;
    for (const p of ['', PROXY]) {
      const r = await fetch(p + (p ? encodeURIComponent(htmlUrl) : htmlUrl),
        {signal: AbortSignal.timeout(8000)});
      if (r.ok) {
        const html = await r.text();
        const m = html.match(/"youtubeId"\s*:\s*"(+)"/);
        if (m) { switchToYT(m[1]); break; }
      }
    }
  } catch {}

  // Build captions
  if (enData && enData.paragraphs) {
    captions = parseTEDTranscript(enData);
    $('cap-status').textContent = `✅ ${captions.length} 段`;
  } else {
    captions = buildDemoCaptions(slug);
    $('cap-status').textContent = '⚠️ 範例字幕';
  }

  // Merge zh
  if (zhData && zhData.paragraphs) {
    mergeZH(zhData);
    $('cap-status').textContent += ' 🇹🇼';
  }
}

function parseTEDTranscript(data) {
  const out = [];
  data.paragraphs.forEach(para => {
    para.cues.forEach(cue => {
      const text = (cue.text||'').trim();
      if (!text) return;
      const start = (cue.time||0)/1000;
      const dur   = (cue.duration||3000)/1000;
      out.push({start, end: start+dur, text});
    });
  });
  return out;
}

function mergeZH(data) {
  let i = 0;
  data.paragraphs.forEach(para => {
    para.cues.forEach(cue => {
      if (captions[i]) captions[i].zh = (cue.text||'').trim();
      i++;
    });
  });
}

    {start:26, end:32, text:"I believe that creativity is at the heart of our humanity.", zh:"我相信創造力是我們人性的核心。"},
    {start:32, end:38, text:"When we suppress creativity, we suppress ourselves.", zh:"當我們壓制創造力時，我們在壓制自己。"},
    {start:38, end:45, text:"Education should be about expanding possibilities.", zh:"教育應該是關於擴展可能性。"},
    {start:45, end:52, text:"Not narrowing them down to a single path.", zh:"而不是將它們縮小到單一路徑。"},
    {start:52, end:58, text:"Thank you very much.", zh:"非常感謝你。"},
  ];
}

// ═══════════════════════════════════════════════════
//  RENDER CAPTIONS
// ═══════════════════════════════════════════════════
function renderCaptions() {
  const list = $('cap-list');
  if (!captions.length) {
    list.innerHTML = '<div class="empty-state"><span style="font-size:2rem">📭</span><span>字幕載入中…</span></div>';
    return;
  }
  list.innerHTML = captions.map((c,i) => {
    const zhBlock = c.zh !== undefined
      ? `<div class="ci-zh${showZh?' show':''}">${esc(c.zh)}</div>`
      : `<div class="ci-zh${showZh?' show':''}">—</div>`;
    return `<div class="ci" id="ci-${i}" data-i="${i}">
      <div class="ci-time">${fmt(c.start)}</div>
      <div class="ci-en">${buildWords(c.text)}</div>
      ${zhBlock}
    </div>`;
  }).join('');

  list.querySelectorAll('.ci').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.classList.contains('w') || e.target.closest('.dt')) return;
      const idx = parseInt(el.dataset.i);
      seekTo(captions[idx].start);
      playMedia();
    });
  });

  updateFontSize();
}

function buildWords(text) {
  return text.split(/(\s+)/).map(p => {
    if (/^\s+$/.test(p)) return p;
    const cl = p.replace(//g,'').toLowerCase();
    const d  = DICT[cl];
    const tip = d
      ? `<span class="dt"><span class="dt-w">${cl}</span><span class="dt-ph"> ${d.ph}</span><div class="dt-pos">${d.pos}</div><div class="dt-def">${d.def}</div><div class="dt-ex">"${d.ex}"</div></span>`
      : `<span class="dt"><span class="dt-w">${cl||p}</span><div class="dt-def" style="color:var(--text3);font-size:.72rem">（點擊查詢字典）</div></span>`;
    return `<span class="w" data-w="${cl}">${esc(p)}${tip}</span>`;
  }).join('');
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(s){ const m=Math.floor(s/60),sec=Math.floor(s%60); return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`; }

// ═══════════════════════════════════════════════════
//  SYNC LOOP
// ═══════════════════════════════════════════════════
function startRaf(){ if(rafId) return; const lp=()=>{ syncCap(); updateProgress(); rafId=requestAnimationFrame(lp); }; lp(); }
function stopRaf(){ if(rafId){cancelAnimationFrame(rafId);rafId=null;} }

function getCurrentTime(){
  if(ytPlayer) try{ return ytPlayer.getCurrentTime(); }catch{}
  return 0;
}
function getDuration(){
  if(ytPlayer) try{ return ytPlayer.getDuration()||1; }catch{}
  return 1;
}

function syncCap(){
  const t   = getCurrentTime();
  const idx = findIdx(t);

  if (autoPause && currentIdx >= 0 && idx !== currentIdx) {
    const prev = captions[currentIdx];
    if (t >= prev.end - 0.05 && autoPausedAt !== currentIdx) {
      autoPausedAt = currentIdx;
      pauseMedia();
    }
  }
  if (idx === currentIdx) return;
  currentIdx = idx;

  document.querySelectorAll('.ci.active').forEach(el => {
    el.classList.remove('active');
    el.querySelectorAll('.w.aw').forEach(w=>w.classList.remove('aw'));
  });
  if (idx < 0) return;
  const item = $(`ci-${idx}`);
  if (!item) return;
  item.classList.add('active');
  item.scrollIntoView({behavior:'smooth',block:'center'});
  item.querySelectorAll('.w').forEach((w,i)=>{
    setTimeout(()=>{
      item.querySelectorAll('.w.aw').forEach(x=>x.classList.remove('aw'));
      w.classList.add('aw');
    }, i*110);
  });
}

function findIdx(t){
  for(let i=0;i<captions.length;i++) if(t>=captions[i].start&&t<captions[i].end) return i;
  return -1;
}

function updateProgress(){
  const pct = getDuration() > 0 ? (getCurrentTime()/getDuration()*100) : 0;
  $('progress-bar').style.width = Math.min(100,pct) + '%';
}

// Progress bar click
$('progress-wrap').addEventListener('click', e => {
  const rect  = $('progress-wrap').getBoundingClientRect();
  const pct   = (e.clientX - rect.left) / rect.width;
  const newT  = pct * getDuration();
  seekTo(newT);
});

// ═══════════════════════════════════════════════════
//  MEDIA CONTROLS
// ═══════════════════════════════════════════════════
function playMedia(){ if(ytPlayer) try{ytPlayer.playVideo();}catch{} }
function pauseMedia(){ if(ytPlayer) try{ytPlayer.pauseVideo();}catch{} }
function seekTo(t){ if(ytPlayer) try{ytPlayer.seekTo(t,true);}catch{} }
function isPlaying(){ if(ytPlayer) try{return ytPlayer.getPlayerState()===YT.PlayerState.PLAYING;}catch{} return false; }

$('pp-btn').addEventListener('click',()=>{ if(isPlaying()) pauseMedia(); else playMedia(); });
$('speed-sel').addEventListener('change',e=>{ if(ytPlayer) try{ytPlayer.setPlaybackRate(parseFloat(e.target.value));}catch{} });
$('rep-btn').addEventListener('click', replay);

function replay(){
  if(currentIdx<0) return;
  autoPausedAt=-1;
  seekTo(captions[currentIdx].start);
  playMedia();
}

$('ap-btn').addEventListener('click',()=>{
  autoPause=!autoPause; autoPausedAt=-1;
  $('ap-btn').classList.toggle('on',autoPause);
  $('ap-btn').textContent=autoPause?'▶ 自動暫停 ON':'⏸ 自動暫停';
});

$('fs-range').addEventListener('input',e=>{
  fontSize=parseInt(e.target.value); updateFontSize();
});
function updateFontSize(){
  document.documentElement.style.setProperty('--cfz',fontSize+'px');
}

// ═══════════════════════════════════════════════════
//  EVENT LISTENERS
// ═══════════════════════════════════════════════════
function setupEventListeners(){
  // Category tabs
  document.querySelectorAll('.cat-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      renderTalkList();
    });
  });

  // Search
  $('talk-search').addEventListener('input',e=>{
    searchQuery = e.target.value;
    renderTalkList();
  });

  // zh toggle
  $('zh-btn').addEventListener('click',()=>{
    showZh=!showZh;
    $('zh-btn').classList.toggle('on',showZh);
    $('zh-btn').textContent = showZh?'🇹🇼 中文':'🇺🇸 英文';
    $('zh-cap-btn').classList.toggle('on',showZh);
    document.querySelectorAll('.ci-zh').forEach(el=>el.classList.toggle('show',showZh));
  });
  $('zh-cap-btn').addEventListener('click',()=>{ $('zh-btn').click(); });

  // Theme
  $('theme-btn').addEventListener('click',()=>{
    isDark=!isDark;
    document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
    $('theme-btn').textContent=isDark?'🌙':'☀️';
  });

  // Fullscreen captions
  $('fullscr-btn').addEventListener('click',()=>{
    const r = $('right');
    if (!document.fullscreenElement) r.requestFullscreen?.();
    else document.exitFullscreen?.();
  });

  // Keyboard
  document.addEventListener('keydown',e=>{
    const tag=e.target.tagName;
    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;
    switch(e.key){
      case ' ': e.preventDefault(); if(isPlaying()) pauseMedia(); else playMedia(); break;
      case 'ArrowLeft':  e.preventDefault(); seekTo(Math.max(0,getCurrentTime()-5)); break;
      case 'ArrowRight': e.preventDefault(); seekTo(getCurrentTime()+5); break;
      case 'r': case 'R': replay(); break;
      case 'a': case 'A': $('ap-btn').click(); break;
      case 'z': case 'Z': $('zh-btn').click(); break;
      case '+': case '=': fontSize=Math.min(26,fontSize+1); $('fs-range').value=fontSize; updateFontSize(); break;
      case '-': fontSize=Math.max(12,fontSize-1); $('fs-range').value=fontSize; updateFontSize(); break;
      case 't': case 'T': $('theme-btn').click(); break;
    }
  });
}

function showLoad(m){ $('load-msg').textContent=m||'載入中…'; $('loading').classList.add('show'); }
function hideLoad(){ $('loading').classList.remove('show'); }

// init
updateFontSize();
</script>
