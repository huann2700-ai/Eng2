<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI English Learning Player</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#0f1115;
    color:white;
    height:100vh;
    overflow:hidden;
}

.container{
    display:flex;
    height:100vh;
}

.left-panel{
    width:60%;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.right-panel{
    width:40%;
    border-left:1px solid rgba(255,255,255,0.1);
    background:#161a22;
    display:flex;
    flex-direction:column;
}

.header{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1f2430;
    color:white;
    font-size:16px;
}

button{
    border:none;
    padding:14px 20px;
    border-radius:12px;
    background:#4f7cff;
    color:white;
    cursor:pointer;
    font-weight:600;
    transition:0.2s;
}

button:hover{
    transform:translateY(-2px);
    background:#6a90ff;
}

#player{
    width:100%;
    aspect-ratio:16/9;
    border-radius:18px;
    overflow:hidden;
    background:black;
}

.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.control-btn{
    background:#222836;
}

.status{
    color:#8e9bb5;
    font-size:14px;
}

.subtitle-container{
    flex:1;
    overflow-y:auto;
    padding:30px;
    scroll-behavior:smooth;
}

.subtitle-line{
    padding:16px;
    margin-bottom:14px;
    border-radius:16px;
    cursor:pointer;
    transition:0.3s;
    line-height:2;
    border:1px solid transparent;
}

.subtitle-line:hover{
    background:#222836;
}

.subtitle-line.active{
    background:#2f436d;
    border:1px solid #5d91ff;
    transform:scale(1.02);
}

.english{
    font-size:26px;
    font-weight:700;
    margin-bottom:10px;
}

.chinese{
    font-size:16px;
    color:#b3bdd1;
}

.word{
    display:inline-block;
    margin-right:6px;
    transition:0.2s;
    padding:2px 4px;
    border-radius:6px;
}

.word.active-word{
    background:#ffd54f;
    color:#000;
    transform:scale(1.15);
    animation:pulse 0.4s infinite alternate;
}

@keyframes pulse{
    from{
        transform:scale(1.05);
    }
    to{
        transform:scale(1.15);
    }
}

.top-title{
    font-size:20px;
    font-weight:700;
    margin-bottom:10px;
}

.empty{
    opacity:0.5;
    text-align:center;
    margin-top:80px;
    line-height:2;
}

.speed-select{
    background:#222836;
    color:white;
    border:none;
    padding:12px;
    border-radius:12px;
}

@media(max-width:900px){

    .container{
        flex-direction:column;
    }

    .left-panel{
        width:100%;
        height:50%;
    }

    .right-panel{
        width:100%;
        height:50%;
    }

    .english{
        font-size:20px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="left-panel">

        <div class="header">
            <input 
                type="text" 
                id="youtubeUrl"
                placeholder="貼上 YouTube 網址..."
            />

            <button onclick="loadVideo()">
                載入影片
            </button>
        </div>

        <div id="player"></div>

        <div class="controls">

            <button class="control-btn" onclick="togglePlay()">
                ▶ 播放 / 暫停
            </button>

            <button class="control-btn" onclick="replayCurrentLine()">
                ↺ 重播句子
            </button>

            <button class="control-btn" onclick="toggleDarkMode()">
                🌙 深色模式
            </button>

            <select class="speed-select" onchange="changeSpeed(this.value)">
                <option value="0.75">0.75x</option>
                <option value="1" selected>1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
            </select>

        </div>

        <div class="status" id="status">
            等待載入影片...
        </div>

    </div>

    <div class="right-panel">

        <div class="subtitle-container" id="subtitleContainer">

            <div class="empty">
                貼上 YouTube 網址後開始學習英文<br><br>
                ✔ 即時字幕同步<br>
                ✔ 逐字跳動效果<br>
                ✔ 點擊字幕跳轉時間<br>
                ✔ 類 ListenLeap 學習模式
            </div>

        </div>

    </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;
let subtitles = [];
let currentIndex = -1;
let animationFrame;
let darkMode = true;

function onYouTubeIframeAPIReady(){

    player = new YT.Player('player',{

        height:'100%',
        width:'100%',

        videoId:'',

        playerVars:{
            playsinline:1,
            rel:0
        },

        events:{
            onReady:onPlayerReady
        }
    });
}

function onPlayerReady(){
    document.getElementById("status").innerText =
        "YouTube Player 已準備完成";
}

function extractVideoId(url){

    const regExp =
        /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?v=))([^#&?]*).*/;

    const match = url.match(regExp);

    return (match && match[7].length == 11)
        ? match[7]
        : null;
}

async function loadVideo(){

    const url = document.getElementById("youtubeUrl").value;

    const videoId = extractVideoId(url);

    if(!videoId){
        alert("請輸入有效的 YouTube 網址");
        return;
    }

    player.loadVideoById(videoId);

    document.getElementById("status").innerText =
        "影片載入中...";

    await loadFakeSubtitles();

    renderSubtitles();

    startTracking();
}

async function loadFakeSubtitles(){

    // 模擬字幕資料
    // 真實情況可串接字幕 API

    subtitles = [

        {
            start:0,
            end:4,
            text:"Welcome to the future of English learning.",
            zh:"歡迎來到英文學習的未來。"
        },

        {
            start:5,
            end:10,
            text:"You can improve your listening naturally.",
            zh:"你可以自然提升聽力能力。"
        },

        {
            start:11,
            end:16,
            text:"Practice every day and become fluent.",
            zh:"每天練習並變得流利。"
        },

        {
            start:17,
            end:22,
            text:"This subtitle player follows every word.",
            zh:"這個字幕播放器會追蹤每個單字。"
        },

        {
            start:23,
            end:29,
            text:"Learning English should feel immersive.",
            zh:"學英文應該有沉浸感。"
        }

    ];
}

function renderSubtitles(){

    const container =
        document.getElementById("subtitleContainer");

    container.innerHTML = "";

    subtitles.forEach((sub,index)=>{

        const div = document.createElement("div");

        div.className = "subtitle-line";

        div.id = `sub-${index}`;

        div.onclick = ()=>{

            player.seekTo(sub.start,true);
        };

        const words = sub.text.split(" ");

        const wordHTML = words.map(word=>{

            return `<span class="word">${word}</span>`;

        }).join(" ");

        div.innerHTML = `

            <div class="english">
                ${wordHTML}
            </div>

            <div class="chinese">
                ${sub.zh}
            </div>
        `;

        container.appendChild(div);
    });
}

function startTracking(){

    cancelAnimationFrame(animationFrame);

    function update(){

        if(player && player.getCurrentTime){

            const time = player.getCurrentTime();

            subtitles.forEach((sub,index)=>{

                const el =
                    document.getElementById(`sub-${index}`);

                if(time >= sub.start && time <= sub.end){

                    if(currentIndex !== index){

                        currentIndex = index;

                        document
                            .querySelectorAll(".subtitle-line")
                            .forEach(s=>{

                                s.classList.remove("active");
                            });

                        el.classList.add("active");

                        el.scrollIntoView({
                            behavior:"smooth",
                            block:"center"
                        });
                    }

                    animateWords(el,time,sub);

                }
            });
        }

        animationFrame =
            requestAnimationFrame(update);
    }

    update();
}

function animateWords(el,time,sub){

    const words = el.querySelectorAll(".word");

    words.forEach(w=>w.classList.remove("active-word"));

    const duration =
        sub.end - sub.start;

    const progress =
        (time - sub.start) / duration;

    const activeWord =
        Math.floor(progress * words.length);

    if(words[activeWord]){

        words[activeWord]
            .classList.add("active-word");
    }
}

function togglePlay(){

    const state = player.getPlayerState();

    if(state === 1){

        player.pauseVideo();

    }else{

        player.playVideo();
    }
}

function replayCurrentLine(){

    if(currentIndex >= 0){

        player.seekTo(
            subtitles[currentIndex].start,
            true
        );
    }
}

function changeSpeed(speed){

    player.setPlaybackRate(
        parseFloat(speed)
    );
}

function toggleDarkMode(){

    darkMode = !darkMode;

    if(darkMode){

        document.body.style.background =
            "#0f1115";

    }else{

        document.body.style.background =
            "#f4f4f4";

        document.body.style.color =
            "#000";
    }
}

document.addEventListener("keydown",(e)=>{

    if(e.code === "Space"){

        e.preventDefault();

        togglePlay();
    }

    if(e.code === "ArrowLeft"){

        player.seekTo(
            player.getCurrentTime()-5,
            true
        );
    }

    if(e.code === "ArrowRight"){

        player.seekTo(
            player.getCurrentTime()+5,
            true
        );
    }
});

</script>

</body>
</html>
